<!DOCTYPE html>
<html lang="pt-BR" translate="no">
  <head>
    <script>
      // Early capture of PWA installation prompt
      window.addEventListener('beforeinstallprompt', (e) => {
        e.preventDefault();
        window.deferredInstallPrompt = e;
        // Dispatch custom event to notify usePWA hook if it is already mounted
        window.dispatchEvent(new CustomEvent('pwa-beforeinstallprompt', { detail: e }));
      });

      // Aggressive fallback to detect old build chunks and clear cache automatically
      window.addEventListener('error', function(e) {
        var errorMsg = String(e.message || e.error || "");
        var isChunkError = errorMsg.indexOf("ChunkLoadError") !== -1 || 
                           errorMsg.indexOf("Loading chunk") !== -1 || 
                           errorMsg.indexOf("Failed to fetch dynamically imported module") !== -1 ||
                           (e.target && (e.target.tagName === 'SCRIPT' || e.target.tagName === 'LINK'));
        
        if (isChunkError) {
          console.error("[PWA_FALLBACK] Falha de recurso ou chunk antigo detectado. Limpando caches e recarregando...", e);
          
          if ('caches' in window) {
            caches.keys().then(function(keys) {
              return Promise.all(
                keys.map(function(key) {
                  return caches.delete(key);
                })
              );
            }).then(function() {
              if ('serviceWorker' in navigator) {
                return navigator.serviceWorker.getRegistrations().then(function(regs) {
                  return Promise.all(
                    regs.map(function(r) {
                      return r.unregister();
                    })
                  );
                });
              }
            }).catch(function(err) {
              console.error("[PWA_FALLBACK] Falha ao limpar caches:", err);
            }).finally(function() {
              window.location.reload(true);
            });
          } else {
            window.location.reload(true);
          }
        }
      }, true); // Use capture phase to catch script/link load failures

      // Catch unhandled promise rejections representing module/chunk loading failures
      window.addEventListener('unhandledrejection', function(e) {
        var reasonText = String(e.reason || "");
        var isChunkRejection = reasonText.indexOf("ChunkLoadError") !== -1 || 
                               reasonText.indexOf("Loading chunk") !== -1 || 
                               reasonText.indexOf("Failed to fetch dynamically imported module") !== -1;
        
        if (isChunkRejection) {
          console.error("[PWA_FALLBACK] Promessa rejeitada por falha de chunk detectada. Forçando limpeza de caches...", e);
          if ('caches' in window) {
            caches.keys().then(function(keys) {
              return Promise.all(
                keys.map(function(key) {
                  return caches.delete(key);
                })
              );
            }).finally(function() {
              window.location.reload(true);
            });
          } else {
            window.location.reload(true);
          }
        }
      });
    </script>
    <meta charset="UTF-8" />
    <meta name="google" content="notranslate" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#b5895a" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Belare" />
    <link rel="apple-touch-icon" href="/icons/icon-192x192.svg" />
    <link rel="apple-touch-icon" sizes="152x152" href="/icons/icon-152x152.svg" />
    <link rel="apple-touch-icon" sizes="180x180" href="/icons/icon-192x192.svg" />

    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>BelareStudio - Gestão Inteligente</title>

    <!-- Tailwind handles UI -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />

    <style>
      :root {
        --primary-color: #f97316;
      }
      body { font-family: 'Poppins', sans-serif; }
      .scrollbar-hide::-webkit-scrollbar { display: none; }
      .scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }
      
      /* Custom scrollbar for sidebar */
      ::-webkit-scrollbar {
        width: 5px;
      }
      ::-webkit-scrollbar-track {
        background: transparent;
      }
      ::-webkit-scrollbar-thumb {
        background: #e2e8f0;
        border-radius: 10px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: #cbd5e1;
      }

      /* Dynamic Theme Overrides */
      .bg-primary { background-color: var(--primary-color) !important; }
      .text-primary { color: var(--primary-color) !important; }
      .border-primary { border-color: var(--primary-color) !important; }
      .ring-primary { --tw-ring-color: var(--primary-color) !important; }
      
      /* Sidebar Active State Override */
      .sidebar-active {
        background-color: color-mix(in srgb, var(--primary-color), white 90%) !important;
        color: var(--primary-color) !important;
        border-color: color-mix(in srgb, var(--primary-color), white 80%) !important;
      }
    </style>
  </head>
  <body class="bg-slate-50 notranslate">
    <div id="root"></div>
    <script type="module" src="./index.tsx"></script>
  </body>
</html>
