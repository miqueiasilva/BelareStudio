<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#f97316" />
  <title>Agendar | BelareStudio</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', sans-serif;
      background: #fff7f0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .card {
      background: white;
      border-radius: 32px;
      padding: 48px 32px;
      text-align: center;
      box-shadow: 0 20px 60px rgba(249,115,22,0.15);
      max-width: 400px;
      width: 100%;
    }
    .spinner {
      width: 56px;
      height: 56px;
      border: 5px solid #fed7aa;
      border-top-color: #f97316;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 24px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    h1 {
      font-size: 18px;
      font-weight: 900;
      color: #1e293b;
      margin-bottom: 8px;
      letter-spacing: -0.3px;
    }
    p {
      font-size: 13px;
      color: #94a3b8;
      font-weight: 600;
    }
    .btn {
      display: inline-block;
      margin-top: 24px;
      background: #f97316;
      color: white;
      font-weight: 900;
      font-size: 14px;
      padding: 14px 32px;
      border-radius: 16px;
      text-decoration: none;
      box-shadow: 0 8px 24px rgba(249,115,22,0.3);
      transition: opacity 0.2s;
    }
    .btn:hover { opacity: 0.9; }
    #manual-link { display: none; }
  </style>
</head>
<body>
  <div class="card">
    <div class="spinner"></div>
    <h1>Carregando sua agenda...</h1>
    <p>Você será redirecionado em instantes.</p>
    <div id="manual-link">
      <p style="margin-top:16px">Se não for redirecionado automaticamente:</p>
      <a id="link-btn" class="btn" href="#">Abrir Agenda →</a>
    </div>
  </div>

  <script>
    (function () {
      // Extrai o sid do pathname: /agendar/SEU-SID
      var path = window.location.pathname;
      var parts = path.split('/');
      var sid = parts[parts.length - 1] || '';

      // Monta a URL final com hash
      var base = window.location.origin;
      var target = base + '/#/public-preview?sid=' + sid;

      // Atualiza o link manual de fallback
      var btn = document.getElementById('link-btn');
      if (btn) btn.href = target;

      // Tenta redirecionar imediatamente
      try {
        window.location.replace(target);
      } catch (e) {
        window.location.href = target;
      }

      // Mostra o botão manual após 2s caso o redirect falhe (WebView restritivo)
      setTimeout(function () {
        var ml = document.getElementById('manual-link');
        if (ml) ml.style.display = 'block';
      }, 2000);
    })();
  </script>
</body>
</html>
